<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生成绩查询终端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #f4f4f4; --fg: #000; --theme: #0055cc; --green: #00aa00; --red: #ee0000; }
        body { background-color: var(--bg); color: var(--fg); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .box { background: #fff; border: 3px solid #000; padding: 25px; box-shadow: 6px 6px 0px #000; width: 100%; max-width: 500px; margin-top: 10px; box-sizing: border-box; }
        h2 { border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 0; font-size: 22px; text-transform: uppercase; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #000; font-family: inherit; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; background: #fff; border-radius: 0; }
        button { background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; font-family: inherit; border-radius: 0; }
        button:active { background: #444; transform: translateY(2px); }
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        @media (max-width: 480px) { .ans-grid { grid-template-columns: repeat(2, 1fr); } }
        .ans-cell { border: 2px solid #000; padding: 10px 2px; font-size: 14px; text-align: center; cursor: pointer; transition: 0.2s; }
        .ans-cell.active-cell { background: #000; color: #fff; }
        .mark { font-weight: bold; margin-left: 3px; }
        .mark.right { color: var(--green); }
        .mark.wrong { color: var(--red); }
        .analysis-box { background: #fffbe6; border: 2px dashed #000; padding: 15px; display: none; margin-top: 10px; font-size: 15px; line-height: 1.6; }
        .status-msg { font-size: 14px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="box" id="login-section">
    <h2>Student Terminal</h2>
    <div id="status-text" class="status-msg" style="color: var(--red);">📡 正在连接云端服务器...</div>
    <div id="form-area" style="display:none;">
        <label for="classPwd">🔑 班级查询密码：</label>
        <input type="password" id="classPwd" placeholder="请输入老师设定的密码">
        <label for="examSelect">📅 选择考试场次：</label>
        <select id="examSelect"></select>
        <label for="stuName">👤 学生姓名：</label>
        <input type="text" id="stuName" placeholder="必须与名单一致">
        <button onclick="doSearch()">查询成绩与解析</button>
    </div>
</div>

<div class="box" id="report-section" style="display:none;">
    <h2 id="display-name"></h2>
    <div id="display-info" style="margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom:10px; font-weight: bold; font-size: 14px;"></div>
    <div style="font-size:12px; color:#666; margin-bottom: 10px;">>> 点击下方格子查看正确答案与解析</div>
    <div id="rounds-container"></div>
    <button onclick="location.reload()" style="margin-top:20px; background:#fff; color:#000;">退出查询</button>
</div>

<script>
const GITHUB_OWNER = "butterfly5117"; 
const GITHUB_REPO = "my-class";
let encryptedCloudData = ""; 
let decryptedAllExams = {};

window.onload = async () => {
    const url = `https://fastly.jsdelivr.net/gh/${GITHUB_OWNER}/${GITHUB_REPO}/data.json?t=${new Date().getTime()}`;
    const statusEl = document.getElementById('status-text');
    try {
        const res = await fetch(url);
        const rawContent = await res.text();
        try {
            const json = JSON.parse(rawContent);
            encryptedCloudData = json.content ? json.content.replace(/\s/g, '') : rawContent;
        } catch(e) { encryptedCloudData = rawContent.replace(/\s/g, ''); }
        statusEl.innerText = "✅ 云端已连接"; statusEl.style.color = "var(--green)";
        document.getElementById('form-area').style.display = "block";
    } catch (e) { statusEl.innerText = "❌ 无法连接: " + e.message; }
};

function unlockExams() {
    const pwd = document.getElementById('classPwd').value.trim();
    try {
        const bytes = CryptoJS.AES.decrypt(encryptedCloudData, pwd);
        const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
        decryptedAllExams = JSON.parse(decryptedStr);
        const select = document.getElementById('examSelect');
        select.innerHTML = "";
        Object.keys(decryptedAllExams).reverse().forEach(name => select.add(new Option(name, name)));
        return true;
    } catch (e) { alert("🔑 密码错误！"); return false; }
}

function doSearch() {
    const name = document.getElementById('stuName').value.trim();
    if (!name) return alert("姓名不能为空！");
    if (Object.keys(decryptedAllExams).length === 0) { if(!unlockExams()) return; }
    const selectedExam = document.getElementById('examSelect').value;
    const allStudents = decryptedAllExams[selectedExam];
    const matchedKey = Object.keys(allStudents).find(k => k.includes(name) || name.includes(k));
    if (matchedKey) {
        document.getElementById('login-section').style.display = 'none';
        renderReport(matchedKey, allStudents[matchedKey]);
    } else { alert(`❌ 未找到成绩`); }
}

function renderReport(name, s) {
    document.getElementById('report-section').style.display = 'block';
    document.getElementById('display-name').innerText = name;
    document.getElementById('display-info').innerText = `班级：${s.c} | 学号：${s.id || '无'}`;
    let html = '';
    [1, 2].forEach(num => {
        if (s[`s${num}`] && s[`s${num}`] !== '-') {
            html += `<div style="margin-top:20px; border-top:2px dashed #000; padding-top:15px;">
                        <div style="font-weight:bold; background:#000; color:#fff; display:inline-block; padding:4px 10px;">R${num} 成绩: ${s[`s${num}`]}</div>
                        <div class="ans-grid">`;
            const ans = s[`a${num}`]; const ana = s[`n${num}`];
            for(let i=1; i<=10; i++) {
                const item = ans ? ans[i] : null; if(!item) continue;
                html += `<div class="ans-cell" id="cell-${num}-${i}" onclick="showAna(${num}, ${i}, '${ana?.[i]?.correct || ''}', '${ana?.[i]?.info || ''}')">
                            Q${i}:${item.a}<span class="mark ${item.ok?'right':'wrong'}">${item.ok?'✔':'✖'}</span>
                        </div>`;
            }
            html += `</div><div class="analysis-box" id="ana-box-${num}"></div></div>`;
        }
    });
    document.getElementById('rounds-container').innerHTML = html;
}

// 修改后的解析显示函数：无论对错均显示正确答案和解析
function showAna(round, qIdx, correct, info) {
    // 1. 只清除【当前这一轮】格子的选中状态，不影响其他轮次
    const currentGrid = document.getElementById(`grid-${round}`) || document.getElementById('rounds-container');
    const cells = currentGrid.querySelectorAll(`.ans-cell`);
    cells.forEach(c => c.classList.remove('active-cell'));

    // 2. 高亮当前点击的格子
    const targetCell = document.getElementById(`cell-${round}-${qIdx}`);
    if (targetCell) {
        targetCell.classList.add('active-cell');
    }

    // 3. 更新对应的解析框内容
    const box = document.getElementById(`ana-box-${round}`);
    if (box) {
        box.style.display = 'block';
        // 使用 innerHTML 重新渲染内容，确保每次点击都刷新
        box.innerHTML = `
            <div style="color:var(--theme); font-weight:bold; margin-bottom:5px; border-bottom:1px solid #ddd; padding-bottom:5px;">
                第 ${qIdx} 题 详情
            </div>
            <div style="margin-bottom:8px;">
                <span style="font-weight:bold;">正确答案：</span>
                <span style="color:var(--green); font-size:18px; font-weight:bold;">${correct || '未录入'}</span>
            </div>
            <div style="color:#333; text-align:justify;">
                <span style="font-weight:bold;">详细解析：</span>${info || '老师暂未提供详细解析内容。'}
            </div>
        `;
        
        // 4. 手机端自动滚动到解析区域（可选，增强体验）
        box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}
</script>
</body>
</html>
